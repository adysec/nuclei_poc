id: exposed-env-file

info:
  name: Exposed .env file
  author: CyberCavalcante
  severity: high

requests:
  - method: GET
    path:
      - "{{BaseURL}}/.env"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "DB_USERNAME="
          - "DB_PASSWORD="
        part: body
        condition: and

      - type: word
        part: header
        words:
          - "text/html"
        negative: true
