id: exposed-env-file
info:
  author: CyberCavalcante
  name: Exposed .env file
  severity: high
http:
- matchers:
  - status:
    - 200
    type: status
  - condition: and
    part: body
    type: word
    words:
    - DB_USERNAME=
    - DB_PASSWORD=
  - negative: true
    part: header
    type: word
    words:
    - text/html
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/.env'
