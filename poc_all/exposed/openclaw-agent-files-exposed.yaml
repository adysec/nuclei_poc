http:
- body: '{}'
  headers:
    Content-Type: application/json
  matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - CLAUDE.md
    - AGENTS.md
    - IDENTITY.md
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/__openclaw/a2ui/api/agents/files/list'
  - '{{BaseURL}}/__openclaw__/a2ui/api/agents/files/list'
id: openclaw-agent-files-exposed
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-200
  description: Detects if agent workspace files (CLAUDE.md, AGENTS.md) are readable
    via WS API
  metadata:
    max-request: 2
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Agent Files Exposed
  remediation: Restrict agents.files.list API to authenticated sessions only. Avoid
    storing secrets in agent instruction files.
  severity: medium
  tags: openclaw,agent,files,prompt
