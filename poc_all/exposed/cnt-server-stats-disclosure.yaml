http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - CNT_ACTIVE_DEVICES
    - STAT_CPU
    - HEALTH_SCEP_WIFI3
  method: GET
  path:
  - '{{BaseURL}}/stats'
  stop-at-first-match: true
id: cnt-server-stats-disclosure
info:
  author: SirBugs
  name: CNT Server Stats Disclosure
  severity: medium
  tags: generic
