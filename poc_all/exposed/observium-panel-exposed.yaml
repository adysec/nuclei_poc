# gap: observium-panel-exposed
id: observium-panel-exposed

info:
  name: Observium Network Monitoring Panel Exposed
  author: TyrusRC
  severity: medium
  description: |
    Detects an exposed Observium network monitoring panel by matching its
    HTML title/branding on the login page. Reachable Observium instances
    routinely leak version metadata via the login screen and are commonly
    deployed with weak or default credentials (admin/admin).
  reference:
    - https://hacktricks.wiki/en/network-services-pentesting/
    - https://docs.observium.org/
  tags: custom,exposures,observium,monitoring,panel

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<title>Observium"
      - type: word
        part: body
        words:
          - "href=\"http://www.observium.org\""
          - "/images/observium"
          - "observium_logo"
        condition: or
