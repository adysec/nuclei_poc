http:
- matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - webSocketDebuggerUrl
    - Browser
    - devtoolsFrontendUrl
  matchers-condition: and
  method: GET
  path:
  - http://{{Hostname}}:9222/json/version
  - http://{{Hostname}}:9222/json/list
id: openclaw-browser-cdp-exposed
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-200
  description: Detects exposed Chrome DevTools Protocol endpoints from OpenClaw sandbox
    browser
  metadata:
    max-request: 2
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Browser CDP Exposed
  remediation: Bind CDP debug port to localhost only. Never expose port 9222 to external
    networks.
  severity: high
  tags: openclaw,browser,cdp,ssrf
