# gap: haproxy-stats-page-exposed
id: haproxy-stats-page-exposed

info:
  name: HAProxy Statistics Page Exposed
  author: TyrusRC
  severity: medium
  description: |
    Detects an unauthenticated HAProxy statistics page reachable via
    the /haproxy?stats endpoint. The stats page discloses backend pool
    topology, server health, active connection counts, and session
    rates that can aid an attacker in mapping internal infrastructure.
  reference:
    - https://hacktricks.wiki/en/network-services-pentesting/
    - https://www.haproxy.org/download/2.8/doc/management.txt
  tags: custom,exposures,haproxy,network,panel

http:
  - method: GET
    path:
      - "{{BaseURL}}/haproxy?stats"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Statistics Report for HAProxy"
