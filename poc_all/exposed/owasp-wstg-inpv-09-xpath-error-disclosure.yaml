# gap: owasp-wstg-inpv-09-xpath-error-disclosure
id: owasp-wstg-inpv-09-xpath-error-disclosure

info:
  name: XPath/XML Error Message Disclosure via Apostrophe Injection
  author: TyrusRC
  severity: low
  description: |
    Injects a single apostrophe into common query parameters (id, user,
    search, q) to provoke an unhandled XPath or XML parser exception and
    matches engine error fingerprints (XPathException, XPathEvalException,
    MS.Internal.Xml.XPath, System.Xml.XPath, unterminated string) in the
    response body. A hit confirms that user input feeds an unparameterised
    XPath query and that engine error messages reach the client, which
    aids enumeration of the underlying document structure and indicates
    likely XPath injection. Requires the application to actually process one
    of the probed parameters through an XPath query.
  reference:
    - https://owasp.org/www-project-web-security-testing-guide/stable/4-Web_Application_Security_Testing/07-Input_Validation_Testing/09-Testing_for_XPath_Injection
    - https://raw.githubusercontent.com/swisskyrepo/PayloadsAllTheThings/master/XPATH%20Injection/README.md
  tags: custom,misconfig,xpath,injection,owasp

http:
  - method: GET
    path:
      - "{{BaseURL}}/?id='"
      - "{{BaseURL}}/?user='"
      - "{{BaseURL}}/?search='"
      - "{{BaseURL}}/?q='"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 500
      - type: word
        part: body
        condition: or
        words:
          - "XPathException"
          - "XPathEvalException"
          - "MS.Internal.Xml.XPath"
          - "System.Xml.XPath"
          - "unterminated string"
          - "Expression must evaluate to a node-set"
          - "Invalid expression"
