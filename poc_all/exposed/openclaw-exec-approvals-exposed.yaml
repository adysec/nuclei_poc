http:
- body: '{}'
  headers:
    Content-Type: application/json
  matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - allowAll
    - approvals
    - rules
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/__openclaw/a2ui/api/exec/approvals'
  - '{{BaseURL}}/__openclaw__/a2ui/api/exec/approvals'
id: openclaw-exec-approvals-exposed
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-862
  description: "Detects if exec approval policy is readable/writable \u2014 attacker\
    \ can auto-approve all commands"
  metadata:
    max-request: 2
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Exec Approvals Policy Exposed
  remediation: Restrict exec approval API to authenticated admin sessions. Never expose
    allowAll=true in production.
  severity: high
  tags: openclaw,exec,approval,policy
