http:
- body: '{}'
  headers:
    Content-Type: application/json
  matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - sessionId
    - agentId
    - transcript
    - sessions
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/__openclaw/a2ui/api/sessions/list'
  - '{{BaseURL}}/__openclaw__/a2ui/api/sessions/list'
id: openclaw-sessions-exposed
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-200
  description: "Detects if session data is accessible without proper auth \u2014 conversation\
    \ history exposure"
  metadata:
    max-request: 2
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Sessions Data Exposed
  remediation: Require authentication for session API endpoints. Restrict /__openclaw/a2ui/api/
    and /__openclaw__/a2ui/api/ to authenticated users.
  severity: medium
  tags: openclaw,sessions,data,exposure
