# gap: host-header-injection-password-reset-poisoning
id: host-header-injection-password-reset-poisoning

info:
  name: Host Header Injection — Password Reset URL Poisoning
  author: TyrusRC
  severity: high
  description: |
    Detects password-reset / forgot-password / account-recovery
    endpoints that build outbound URLs (typically the reset link
    emailed to the user) from the inbound Host header. The probe
    sends GET requests to common reset paths with an attacker-shaped
    Host value and matches the canary as a URL prefix (`https://
    canary.invalid/…`) inside the response body — the precise shape
    server-side email templates produce when they interpolate the
    Host header into the reset link.

    Successful exploitation is account takeover: an attacker
    triggers a password-reset email for a victim while spoofing the
    Host header, the victim receives a legitimate-looking email
    whose reset link points at the attacker domain, the attacker
    receives the password-reset token, and resets the victim's
    password. The class signal — Host-header-derived URL reflected
    in the reset-flow response — is independent of vendor banner.
  reference:
    - https://portswigger.net/web-security/host-header
    - https://portswigger.net/web-security/host-header/exploiting/password-reset-poisoning
    - https://cwe.mitre.org/data/definitions/640.html
  tags: custom,vulnerabilities,host-header,password-reset,takeover,owasp,cwe-640

variables:
  canary: "nuclei-poison-{{rand_text_alpha(8)}}"

http:
  - raw:
      - |+
        GET /forgot-password HTTP/1.1
        Host: {{canary}}.invalid
        Accept: text/html


      - |+
        GET /password/reset HTTP/1.1
        Host: {{canary}}.invalid
        Accept: text/html


      - |+
        GET /account/recover HTTP/1.1
        Host: {{canary}}.invalid
        Accept: text/html


      - |+
        GET /reset-password HTTP/1.1
        Host: {{canary}}.invalid
        Accept: text/html


    unsafe: true
    matchers-condition: or
    matchers:
      # Fire on canary embedded in a URL pattern (href / src / window.location /
      # plain-text URL) — restrictive to differentiate reflection-in-error
      # text from URL injection.
      - type: regex
        part: body
        regex:
          - 'https?://[^\s"<''>]*{{canary}}\.invalid/'

    extractors:
      - type: regex
        part: body
        name: reflected-url
        regex:
          - '(https?://[^\s"<''>]*{{canary}}\.invalid/[^\s"<''>]*)'
        group: 1
