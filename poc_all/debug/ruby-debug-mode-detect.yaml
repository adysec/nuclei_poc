id: ruby-debug-mode-detect

info:
  name: Enabled debug mode in a Ruby on Rails application detection
  author: thefir,vulnspace
  severity: Medium
  description: Enabled debug mode in Ruby on Rails allows to call a stacktrace when accessing a non-existent endpoint.

  tags:
    - ruby
    - rails
    - debug
    - stacktrace
    - error
  metadata:
    max-request: 3

http:
  - method: GET
    path:
      - "{{BaseURL}}/Th3Fir_thispagedoesnotexist_Th3Fir"


    matchers:
      - type: word
        words:
          - "ActionController::RoutingError"
          - "No route matches"
        condition: and
