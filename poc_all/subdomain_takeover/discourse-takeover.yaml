# gap: discourse-takeover
id: discourse-takeover

info:
  name: Discourse Subdomain Takeover Detection
  author: TyrusRC
  severity: high
  description: |
    Detects a dangling CNAME pointing to Discourse hosting that returns the
    "Oops! That page doesn't exist or is private." fingerprint, indicating the
    subdomain can be claimed by registering the missing Discourse forum.
  reference:
    - https://github.com/EdOverflow/can-i-take-over-xyz/issues/49
    - https://meta.discourse.org/t/discourse-hosted-custom-domains/
  tags: custom,takeover,discourse,cloud

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 404
      - type: word
        part: body
        words:
          - "Oops! That page doesn't exist or is private."
