# gap: cors-null-origin-with-credentials
id: cors-null-origin-with-credentials

info:
  name: CORS Null Origin Accepted with Credentials Enabled
  author: TyrusRC
  severity: high
  description: |
    Detects servers that respond with Access-Control-Allow-Origin: null and
    Access-Control-Allow-Credentials: true when sent an Origin: null header.
    This combination lets sandboxed iframes, data: URIs, and other null-origin
    contexts make credentialed cross-origin requests, effectively bypassing the
    Same-Origin Policy for authenticated sessions.
  reference:
    - https://raw.githubusercontent.com/swisskyrepo/PayloadsAllTheThings/master/CORS%20Misconfiguration/README.md
    - https://portswigger.net/web-security/cors
  tags: custom,misconfig,cors,owasp

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    headers:
      Origin: "null"
    matchers-condition: and
    matchers:
      - type: word
        part: header
        case-insensitive: true
        words:
          - "access-control-allow-origin: null"
      - type: word
        part: header
        case-insensitive: true
        words:
          - "access-control-allow-credentials: true"
