http:
- matchers:
  - type: word
    words:
    - Matching policy not found while trying to process Assertion
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/saml/login'
id: citrix-netscaler-saml
info:
  author: darses
  classification:
    cve-id: todo
  description: 'Detected Citrix Netscaler with SAML SP or IDP enabled.

    '
  metadata:
    fofa-query:
    - icon_hash="1418494345"
    max-requests: 1
    product: netscaler
    shodan-query:
    - http.favicon.hash:1418494345
    - product:"Citrix Netscaler"
    vendor: citrix
    verified: false
  name: Citrix Netscaler - SAML
  severity: info
  tags: detect,citrix,netscaler
