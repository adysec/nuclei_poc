http:
- body: '{"type":"event_callback","event":{"type":"message","text":"nuclei_probe","user":"U123","channel":"C123"}}'
  headers:
    Content-Type: application/json
  matchers:
  - status:
    - 200
    - 201
    - 202
    type: status
  - negative: true
    part: body
    type: word
    words:
    - invalid signature
    - unauthorized
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/api/slack/events'
id: openclaw-slack-events-no-signature
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-345
  description: Tests if Slack events endpoint accepts requests without X-Slack-Signature
  metadata:
    max-request: 1
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Slack Events No Signature Validation
  remediation: "Enable Slack signature verification \u2014 set slack.signing_secret\
    \ in OpenClaw channel config."
  severity: high
  tags: openclaw,slack,channel,injection
