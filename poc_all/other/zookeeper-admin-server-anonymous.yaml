# gap: zookeeper-admin-server-anonymous
id: zookeeper-admin-server-anonymous

info:
  name: Apache ZooKeeper AdminServer - Anonymous Commands Disclosure
  author: TyrusRC
  severity: high
  description: |
    Detects Apache ZooKeeper's HTTP AdminServer (default port
    8080, shipped enabled since 3.5.0) reachable anonymously.
    The AdminServer is the JSON/HTTP replacement for the old
    "four-letter words" interface — `GET /commands/conf` and
    `/commands/envi` disclose cluster config, JVM args (which
    can contain secrets if passed via `-D...=`), zk data
    directory paths, and connect strings.

    Wire-format: `GET /commands` returns 200 with JSON envelope
    containing `"command":"commands"` AND lists `"stat"`, `"conf"`,
    `"envi"` substrings. `GET /commands/envi` returns JSON
    containing `"zookeeper.version":` — the canonical ZK fingerprint
    that doesn't appear in any other product.

    Apache's hardening guidance (since CVE-2019-0201) is to set
    `admin.enableServer=false` or use IP allowlisting. Public
    cloud installs and dev clusters frequently miss this.
  reference:
    - https://zookeeper.apache.org/doc/r3.9.0/zookeeperAdmin.html#sc_adminserver
    - https://github.com/apache/zookeeper
    - https://nvd.nist.gov/vuln/detail/CVE-2019-0201
  tags: custom,exposures,zookeeper,admin-server,apache,anonymous,cwe-862

http:
  - method: GET
    path:
      - "{{BaseURL}}/commands"
      - "{{BaseURL}}/commands/envi"
      - "{{BaseURL}}/commands/conf"

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains(content_type, "application/json")'
      - type: word
        part: body
        words:
          - '"command"'
          - 'zookeeper.version'
          - '"stat"'
          - '"envi"'
          - '"conf"'
        condition: or
      - type: regex
        part: body
        regex:
          - '"(?:command|environment|zookeeper\.version|dataDir|clientPort)"'

    extractors:
      - type: regex
        part: body
        name: zookeeper-version
        regex:
          - '"zookeeper\.version"\s*:\s*"([^"]{1,80})"'
        group: 1
      - type: regex
        part: body
        name: client-port
        regex:
          - '"clientPort"\s*:\s*"?(\d{2,5})'
        group: 1
      - type: regex
        part: body
        name: data-dir
        regex:
          - '"(?:dataDir|dataLogDir)"\s*:\s*"([^"]{1,200})"'
        group: 1
