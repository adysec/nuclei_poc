id: bdu2026-05965

info:
  name: BDU-2026-05965 Bitrix Landing module LFI version based detection
  author: haones,vulnspace
  severity: Medium
  description: A vulnerability in the landing module of the 1C-Bitrix Site Management content management system (CMS) vulnerable to LFI (BDU 2026-05965). Exploitation of the vulnerability can allow a remote attacker to read local files on the vulnerable host, which might result in control over resources or access to internal network.
  reference:
    - https://bdu.fstec.ru/vul/2026-05965
    - https://www.bitrix24.com/features/box/box-versions.php?module=landing
  tags: bitrix,lfi
  metadata:
    max-request: 3

http:
  - method: GET
    path:
      - "{{BaseURL}}/bitrix/components/bitrix/landing.site_tile/templates/.default/src/css/landing.site.tile.css"
      - "{{BaseURL}}/components/bitrix/landing.site_tile/templates/.default/src/css/landing.site.tile.css"
      - "{{BaseURL}}/bx/components/bitrix/landing.site_tile/templates/.default/src/css/landing.site.tile.css"

    host-redirects: true
    stop-at-first-match: true
    max-redirects: 3
    matchers-condition: or
    matchers:

      - type: dsl
        name: "landing (25.1100.0) March 10, 2026"
        dsl:
          - "status_code==200 && (\"f16b068377c633bd826ad517bd6b5936\" == md5(body))"

      - type: dsl
        name: "landing (25.600.0) September 22, 2025"
        dsl:
          - "status_code==200 && (\"dfb1176f374e02cf904a1ec1eb35cf75\" == md5(body))"

      - type: dsl
        name: "landing (25.400.0) June 30, 2025"
        dsl:
          - "status_code==200 && (\"cf1e4e2d596edd6b90692c64da82bccc\" == md5(body))"

      - type: dsl
        name: "landing (25.200.0) June 30, 2025"
        dsl:
          - "status_code==200 && (\"78b51108f8bdbd8a7f84f52de87f48da\" == md5(body))"

      - type: dsl
        name: "landing (25.100.0) June 30, 2025"
        dsl:
          - "status_code==200 && (\"5378d2aa0e808f8c559f0183ccde7d7f\" == md5(body))"

      - type: dsl
        name: "landing (24.700.0) December 27, 2024"
        dsl:
          - "status_code==200 && (\"7aeb85a537f685b9873eabfcced0e501\" == md5(body))"

      - type: dsl
        name: "landing (24.500.0) October 3, 2024"
        dsl:
          - "status_code==200 && (\"02e4c864c78583af94943eabb2cf7f25\" == md5(body))"

      - type: dsl
        name: "landing (24.400.0) June 4, 2024"
        dsl:
          - "status_code==200 && (\"6931433035ce781c0dcbade50dc72f7a\" == md5(body))"

      - type: dsl
        name: "landing (23.300.0) May 31, 2023"
        dsl:
          - "status_code==200 && (\"3c0d79a9735c23a968bdf17246f09094\" == md5(body))"

      - type: dsl
