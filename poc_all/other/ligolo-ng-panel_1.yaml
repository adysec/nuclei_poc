http:
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - contains_all(body, "<title>Ligolo-ng</title>", "Ligolo-ng WebUI")
    - status_code == 200
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/login'
id: ligolo-ng-panel
info:
  author: Kazgangap
  description: 'Ligolo-ng panel was detected.

    '
  metadata:
    fofa-query: title="Ligolo-ng"
    max-request: 1
    product: ligolo-ng
    runzero-match: any(each(service["html.titles"]), {# matches "^Ligolo-ng"})
    shodan-query: http.title:"Ligolo-ng"
    vendor: ligolo-ng
    verified: true
  name: Ligolo-ng Panel - Detect
  reference:
  - https://github.com/nicocha30/ligolo-ng
  severity: info
  tags: detect,discovery,ligolo-ng,login,panel
