http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_any(body, "\"skills\"", "\"capabilities\"", "\"agent\"")
    - contains(content_type, "application/json")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/.well-known/agent-card.json'
  - '{{BaseURL}}/.well-known/agent.json'
  stop-at-first-match: true
id: a2a-agent-card-enum
info:
  author: 0x_Akoko
  description: 'Detected exposed Google Agent-to-Agent protocol agent cards. The agent-card.json
    file advertises an AI agent''s capabilities, supported skills, authentication
    requirements, and endpoint URLs.

    '
  metadata:
    max-request: 2
    verified: true
  name: Google A2A Agent Card - Enumeration
  reference:
  - https://huggingface.co/blog/1bo/a2a-protocol-explained
  - https://github.com/google/A2A
  severity: info
  tags: a2a,agent,ai,discovery,enum,google
