id: springboot_actuator_information_leakage
info:
  name: Spring Boot Actuator Information Leakage
  author: yueji0j1anke
  severity: high
  description: Spring Boot Actuator endpoints exposed without authentication
  tags: actuator,unauthorized,springboot

http:
  - method: GET
    path:
      - "{{BaseURL}}/actuator"
      - "{{BaseURL}}/env"
      - "{{BaseURL}}/actuator/env"

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "_links"
          - "beans"
          - "health"
          - "local.server.port"
          - "java.runtime"
          - "activeProfiles"
        condition: or

      - type: word
        part: header
        words:
          - "application/json"
          - "application/vnd.spring-boot.actuator"
        condition: or
