id: Symfony-Profiler-open
info:
  author: nored0x
  description: 'Nuclei template to detect Symfony profiler endpoints revealing sensitive
    database/mailer configuration.

    '
  name: Symfony Profiler - Sensitive Information Exposure
  severity: high
  tags:
  - sensitive-info
  - profiling-endpoint
  - symfony
http:
- matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - database_host
    - database_password
    - mailer_password
  - part: body
    type: word
    words:
    - 'parameters:'
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/app_dev.php/_profiler/open?file=app/config/parameters.yml'
  stop-at-first-match: true
