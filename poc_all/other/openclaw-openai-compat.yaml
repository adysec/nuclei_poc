http:
- body: '{"model":"nonexistent-probe","messages":[{"role":"user","content":"ping"}]}'
  headers:
    Content-Type: application/json
  matchers:
  - status:
    - 400
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - model
    - messages
    - completions
    - openclaw
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/v1/chat/completions'
id: openclaw-openai-compat
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-200
  description: 'Detects OpenClaw''s OpenAI-compatible API endpoints (/v1/chat/completions,
    /v1/responses).

    Confirms by checking for OpenClaw-specific error messages or model listing behavior.

    '
  metadata:
    max-request: 2
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw OpenAI Compatible API Endpoint
  remediation: Restrict API access with auth.mode=token and a strong random token.
  severity: info
  tags: openclaw,detect,api,openai
