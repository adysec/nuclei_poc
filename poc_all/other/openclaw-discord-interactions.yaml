http:
- body: '{"type":1}'
  headers:
    Content-Type: application/json
  matchers:
  - status:
    - 200
    - 201
    type: status
  - part: body
    regex:
    - '"type"\s*:\s*1'
    type: regex
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/api/channels/discord/webhook'
  - '{{BaseURL}}/api/discord/interactions'
id: openclaw-discord-interactions
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-345
  description: 'Detects exposed Discord interactions endpoint that accepts unsigned
    requests.

    Without Ed25519 signature verification, attackers can forge Discord interactions

    to trigger agent commands.

    '
  metadata:
    max-request: 1
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Discord Interactions Endpoint
  remediation: Enable Discord signature verification in OpenClaw channel config. Set
    discord.verify_signature=true.
  severity: medium
  tags: openclaw,discord,channel
