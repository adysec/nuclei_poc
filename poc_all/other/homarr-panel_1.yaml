http:
- host-redirects: true
  matchers:
  - condition: or
    part: response
    type: word
    words:
    - <title>Homarr</title>
    - content="Homarr
    - homarr.locale
    - alt="Homarr
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: homarr-panel
info:
  author: potato-20
  classification:
    cpe: cpe:2.3:a:homarr:homarr:*:*:*:*:*:*:*:*
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: 'Homarr dashboard panel was detected. Homarr is a self-hosted dashboard
    for managing homelab and *arr-stack services.

    '
  metadata:
    fofa-query: title="Homarr"
    max-request: 1
    product: homarr
    runzero-match: any(each(service["html.titles"]), {# matches "^Homarr$"}) || service["http.body"]
      matches `Homarr`
    shodan-query: http.title:"Homarr"
    vendor: homarr
    verified: true
  name: Homarr Dashboard - Detect
  reference:
  - https://github.com/homarr-labs/homarr
  - https://homarr.dev
  severity: info
  tags: dashboard,discovery,homarr,oss,panel
