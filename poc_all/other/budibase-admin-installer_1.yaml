http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(content_type, "application/json")
    - contains(header, "X-Budibase-Tenant-Id")
    - contains_all(body, "\"adminUser\":{\"checked\":false", "\"smtp\"", "\"branding\"",
      "/builder/portal")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/api/global/configs/checklist'
id: budibase-admin-installer
info:
  author: 0x_Akoko
  description: 'Detected Budibase admin setup checklist endpoint was publicly accessible
    with no admin user created, allowing unauthenticated users to complete setup and
    gain full platform control.

    '
  metadata:
    fofa-query: app="Budibase"
    max-request: 1
    product: budibase
    shodan-query: http.title:"Budibase"
    vendor: budibase
    verified: true
  name: Budibase - Admin Installer
  reference:
  - https://github.com/Budibase/budibase
  severity: high
  tags: exposure,setup,installer,budibase
