id: globalprotect-panel2
info:
  author: organiccrap
  name: PaloAlto Networks GlobalProtect Panel
  severity: info
  tags: panel
http:
- matchers:
  - condition: or
    type: word
    words:
    - <title>GlobalProtect Portal</TITLE>
