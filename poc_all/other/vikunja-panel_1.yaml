id: vikunja-panel
info:
  name: Vikunja Login Panel - Detect
  author: matheusalbarello
  severity: info
  description: |
    Vikunja login panel was detected. Vikunja is a self-hosted to-do and project management application.
  reference:
    - https://vikunja.io
    - https://github.com/go-vikunja/vikunja
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "^Vikunja$"}) || service["http.head.server"] matches "^Vikunja" 
    fofa-query: title="Vikunja"
    max-request: 1
    product: vikunja
    shodan-query: http.title:"vikunja"
    vendor: vikunja
    verified: true
  tags: discovery,login,panel,vikunja
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "Server: Vikunja"
      - type: word
        part: body
        words:
          - "<title>Vikunja</title>"
          - "The to-do app to organize your life"
        condition: and
      - type: status
        status:
          - 200
