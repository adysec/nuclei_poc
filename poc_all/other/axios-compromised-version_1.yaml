http:
- matchers:
  - regex:
    - (?i)axios(?:[^"'<>]*?\.js|[^"'<>]*?[-@/][0-9])
    type: regex
  - condition: or
    regex:
    - axios[/@](?:0\.30\.4|1\.14\.1)
    - axios(?:[^"'<>]*?)\.js\?(?:v(?:er)?=)?(?:0\.30\.4|1\.14\.1)
    - axios(?:[^"'<>]*?)-(?:0\.30\.4|1\.14\.1)(?:[^"'<>]*?)\.js
    - axios(?:[^"'<>]*?)-(?:0-30-4|1-14-1)(?:[^"'<>]*?)\.js
    type: regex
  matchers-condition: and
  max-redirects: 3
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: axios-compromised-version
info:
  author: metascan
  description: 'A compromised version of the axios library (0.30.4 or 1.14.1) has
    been detected in the

    page source. These versions contain malicious code and should be removed immediately
    and

    replaced with a legitimate release from the official axios repository. Presence
    of these

    versions may indicate a supply-chain compromise.

    '
  name: Compromised Axios Version Detected
  reference:
  - https://github.com/axios/axios
  severity: high
  tags: javascript,axios,detection
