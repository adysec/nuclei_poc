# gap: asp-net-viewstate-mac-disabled
id: asp-net-viewstate-mac-disabled

info:
  name: ASP.NET ViewState MAC Validation Disabled
  author: TyrusRC
  severity: high
  description: |
    Detects ASP.NET WebForms pages shipping with `EnableViewStateMac="false"`
    (MAC validation disabled). Without MAC, the serialized `__VIEWSTATE`
    blob can be tampered with by an attacker and is the canonical
    foundation for ObjectStateFormatter / LosFormatter deserialization
    RCE chains (the same primitive behind CVE-2025-30406 / Gladinet).

    Wire-format fingerprint (passive, single-response GET):
    - body MUST contain hidden field `__VIEWSTATE`
    - body MUST NOT contain `__VIEWSTATEGENERATOR`
    - body MUST NOT contain `__EVENTVALIDATION`

    Background: when MAC is enabled, the .NET runtime always emits
    a paired `__VIEWSTATEGENERATOR` hidden input to seed key
    derivation. The pair always appears together. The presence of
    `__VIEWSTATE` *alone* (with neither `__VIEWSTATEGENERATOR`
    nor `__EVENTVALIDATION`) is therefore the canonical Invicti
    "ViewState MAC Disabled" check — extremely low FP.
  reference:
    - https://learn.microsoft.com/en-us/troubleshoot/developer/webapps/aspnet/development/viewstate-mac-disabled
    - https://www.invicti.com/web-vulnerability-scanner/vulnerabilities/viewstate-mac-disabled
    - https://blog.liquidsec.net/2014/10/15/breaking-net-using-viewstate/
  tags: custom,misconfig,aspnet,viewstate,deserialization,owasp,cwe-345

http:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/default.aspx"
      - "{{BaseURL}}/Default.aspx"
      - "{{BaseURL}}/login.aspx"
      - "{{BaseURL}}/Login.aspx"

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
      - type: regex
        part: body
        regex:
          - "(?i)<input\\s+[^>]*name=[\"']?__VIEWSTATE[\"']?[^>]*value=[\"'][A-Za-z0-9+/=]{20,}"
      - type: word
        part: body
        negative: true
        words:
          - '__VIEWSTATEGENERATOR'
      - type: word
        part: body
        negative: true
        words:
          - '__EVENTVALIDATION'

    extractors:
      - type: regex
        part: body
        name: viewstate-prefix
        regex:
          - "__VIEWSTATE[\"']?\\s+value=[\"']([A-Za-z0-9+/=]{0,80})"
        group: 1
