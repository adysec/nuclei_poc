id: axios-compromised-version

info:
  name: Compromised Axios Version Detected
  author: metascan
  severity: high
  description: |
    A compromised version of the axios library (0.30.4 or 1.14.1) has been detected in the
    page source. These versions contain malicious code and should be removed immediately and
    replaced with a legitimate release from the official axios repository. Presence of these
    versions may indicate a supply-chain compromise.
  reference:
    - https://github.com/axios/axios
  tags: javascript,axios,detection

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    redirects: true
    max-redirects: 3

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "(?i)axios(?:[^\"'<>]*?\\.js|[^\"'<>]*?[-@/][0-9])"
      - type: regex
        condition: or
        regex:
          - "axios[/@](?:0\\.30\\.4|1\\.14\\.1)"
          - "axios(?:[^\"'<>]*?)\\.js\\?(?:v(?:er)?=)?(?:0\\.30\\.4|1\\.14\\.1)"
          - "axios(?:[^\"'<>]*?)-(?:0\\.30\\.4|1\\.14\\.1)(?:[^\"'<>]*?)\\.js"
          - "axios(?:[^\"'<>]*?)-(?:0-30-4|1-14-1)(?:[^\"'<>]*?)\\.js"
