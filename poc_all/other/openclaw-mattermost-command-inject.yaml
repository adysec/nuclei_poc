http:
- body: token=openclaw&text=nuclei_probe&user_name=nuclei&command=%2Fopenclaw
  headers:
    Content-Type: application/x-www-form-urlencoded
  matchers:
  - status:
    - 200
    - 201
    - 202
    type: status
  - part: body
    regex:
    - '"(text|response_type|attachments)"'
    type: regex
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/api/channels/mattermost/command'
id: openclaw-mattermost-command-inject
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-345
  description: 'Tests if Mattermost slash command endpoint accepts unsigned requests.

    Without token verification, attackers can forge slash commands to trigger

    agent actions via the Mattermost integration channel.

    '
  metadata:
    max-request: 1
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Mattermost Command Injection
  remediation: Set mattermost.verification_token in OpenClaw channel config and validate
    incoming request tokens.
  severity: high
  tags: openclaw,mattermost,channel,injection
