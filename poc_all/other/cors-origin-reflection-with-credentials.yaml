# gap: cors-origin-reflection-with-credentials
id: cors-origin-reflection-with-credentials

info:
  name: CORS Policy Reflects Any Origin with Credentials Allowed
  author: TyrusRC
  severity: high
  description: |
    Detects servers that reflect an arbitrary Origin header back in
    Access-Control-Allow-Origin while also setting Access-Control-Allow-Credentials: true.
    This combination enables cross-origin authenticated requests from any domain,
    effectively bypassing the Same-Origin Policy for credentialed sessions.
  reference:
    - https://raw.githubusercontent.com/swisskyrepo/PayloadsAllTheThings/master/CORS%20Misconfiguration/README.md
    - https://portswigger.net/web-security/cors/access-control-allow-origin
  tags: custom,misconfig,cors,owasp

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    headers:
      Origin: "https://attacker.example.com"
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "Access-Control-Allow-Origin: https://attacker.example.com"
      - type: word
        part: header
        words:
          - "Access-Control-Allow-Credentials: true"
