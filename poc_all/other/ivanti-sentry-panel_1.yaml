http:
- extractors:
  - group: 1
    regex:
    - \?([\d.]+)"
    type: regex
  host-redirects: true
  matchers:
  - condition: and
    type: word
    words:
    - Ivanti System Manager
    - sentry
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/mics/login.jsp'
id: ivanti-sentry-panel
info:
  author: DhiyaneshDk
  description: 'Ivanti Sentry panel was detected.

    '
  metadata:
    max-request: 1
    product: sentry
    shodan-query: http.favicon.hash:967636089
    verified: true
  name: Ivanti Sentry Panel - Detect
  severity: info
  tags: panel,ivanti,discovery,login,sentry
