http:
- body: '{"text":"probe"}'
  headers:
    Content-Type: application/json
  matchers:
  - status:
    - 200
    - 202
    type: status
  - negative: true
    type: word
    words:
    - unauthorized
    - forbidden
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/hooks/agent'
  - '{{BaseURL}}/hooks/wake'
  - '{{BaseURL}}/hooks'
id: openclaw-hooks-no-auth
info:
  author: LobsterGuard
  classification:
    cwe-id: CWE-306
  description: "OpenClaw webhook hooks endpoint accessible without token \u2014 allows\
    \ injecting messages into agent sessions"
  metadata:
    max-request: 3
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Hooks Endpoint No Authentication
  remediation: Require authentication tokens on webhook hook endpoints. Restrict /hooks/*
    to trusted sources via IP allowlist or HMAC verification.
  severity: high
  tags: openclaw,misconfig,hooks
