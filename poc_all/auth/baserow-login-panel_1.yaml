http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - <title>Login // Baserow</title>
    - BASEROW_DISABLE_PUBLIC_URL_CHECK
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/login'
id: baserow-login-panel
info:
  author: Th3l0newolf
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: 'Baserow login interface was discovered.

    '
  metadata:
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches `^Login \/\/ Baserow`})
    shodan-query: html:"Login // Baserow"
    verified: true
  name: Baserow Login - Panel Detect
  severity: info
  tags: baserow,discovery,login,panel
