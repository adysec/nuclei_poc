http:
- matchers:
  - part: body
    type: word
    words:
    - <title>Login | Rallly</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/login'
id: rallly-login-panel
info:
  author: Th3l0newolf
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: 'Rallly login interface was discovered.

    '
  metadata:
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches `^Login | Rally`})
    shodan-query: html:"Login | Rallly"
    verified: true
  name: Rallly Login - Panel Detect
  severity: info
  tags: discovery,login,panel,rallly
