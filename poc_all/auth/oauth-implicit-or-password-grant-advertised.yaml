# gap: oauth-implicit-or-password-grant-advertised
id: oauth-implicit-or-password-grant-advertised

info:
  name: OAuth Authorization Server Advertises Deprecated Implicit or Password Grant
  author: TyrusRC
  severity: medium
  description: |
    Detects OAuth / OIDC authorization servers whose discovery document
    advertises grant types that OAuth 2.1 (draft-ietf-oauth-v2-1) and
    RFC 9700 (Jan 2025) explicitly remove or deprecate:

      * `response_types_supported` containing `"token"` or
        `"id_token token"` — the Implicit Grant, removed by OAuth 2.1
        because access tokens delivered in the URL fragment leak via
        browser history, referrer headers, and shared logs.
      * `grant_types_supported` containing `"password"` — the Resource
        Owner Password Credentials grant, removed by OAuth 2.1 because
        the client handles raw user credentials, defeating SSO,
        defeating MFA, and turning every relying party into a
        credential-stuffing risk.

    Class detection — capability-advertisement check on a standardized
    discovery document; survives vendor / version changes and catches
    future deployments where the deprecated grant is re-enabled. Severity
    is medium (no immediate exploitation, but a load-bearing primitive
    for credential phishing and token leakage chains).
  reference:
    - https://datatracker.ietf.org/doc/html/rfc9700
    - https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1
    - https://datatracker.ietf.org/doc/html/rfc6749#section-4.2
  tags: custom,misconfig,oauth,oidc,owasp

http:
  - method: GET
    path:
      - "{{BaseURL}}/.well-known/openid-configuration"
      - "{{BaseURL}}/.well-known/oauth-authorization-server"
      - "{{BaseURL}}/oauth2/.well-known/openid-configuration"

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "application/json"
      - type: word
        part: body
        words:
          - '"issuer"'
          - '"authorization_endpoint"'
        condition: and
      - type: regex
        part: body
        regex:
          - '"response_types_supported"\s*:\s*\[[^\]]*"(token|id_token token|token id_token)"'
          - '"grant_types_supported"\s*:\s*\[[^\]]*"password"'
        condition: or

    extractors:
      - type: regex
        part: body
        name: issuer
        regex:
          - '"issuer"\s*:\s*"([^"]+)"'
        group: 1
      - type: regex
        part: body
        name: response-types
        regex:
          - '"response_types_supported"\s*:\s*\[([^\]]+)\]'
        group: 1
      - type: regex
        part: body
        name: grant-types
        regex:
          - '"grant_types_supported"\s*:\s*\[([^\]]+)\]'
        group: 1
