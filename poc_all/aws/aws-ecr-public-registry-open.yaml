# gap: aws-ecr-public-registry-open
id: aws-ecr-public-registry-open

info:
  name: AWS ECR Public Registry Endpoint Reachable
  author: TyrusRC
  severity: info
  description: |
    Confirms the AWS ECR Public registry HTTP API v2 endpoint
    (*.public.ecr.aws/v2/) is reachable. The endpoint is intentionally
    public by AWS design, so this is a precondition signal rather than
    a finding on its own — actionable exposure requires that a specific
    alias/repo under the target's AWS account is enumerable. Pair with
    a /v2/{alias}/{repo}/tags/list probe scoped to the target's known
    aliases to confirm unintended publication of internal images.
  reference:
    - https://raw.githubusercontent.com/HackTricks-wiki/hacktricks-cloud/master/src/pentesting-cloud/aws-security/aws-unauthenticated-enum-access/aws-ecr-unauthenticated-enum/README.md
    - https://docs.aws.amazon.com/AmazonECR/latest/public/public-registries.html
  tags: custom,cloud,aws,ecr,registry

http:
  - method: GET
    path:
      - "{{BaseURL}}/v2/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 401
      - type: dsl
        dsl:
          - 'contains(host, "public.ecr.aws")'
      - type: word
        part: header
        case-insensitive: true
        words:
          - "docker-distribution-api-version: registry/2.0"
