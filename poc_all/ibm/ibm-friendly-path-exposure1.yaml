id: ibm-friendly-path-exposure1
info:
  author: clarkvoss
  description: Finds friendly path exposed that can be used to access signup page
    and create new user accounts.
  name: IBM Websphere Friendly Path Exposure
  reference: https://clarkvoss.medium.com/how-to-harpon-big-blue-c163722638d8
  severity: medium
  tags: ibm,exposure
http:
- matchers:
  - part: body
    type: word
    words:
    - Friendly path
    - IBM WebSphere Portal
  - part: header
    type: word
    words:
    - text/html
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'GET /wps/portal/client/welcome/!ut/p/z1/04_Sj9CPykssy0xPLMnMz0vMAfIjo8ziHd3DQgMNnM3N_M1DjA08PX0NgoNcnQwt3Ez1wwkpiAJKG-AAjgb6BbmhigBypoQ7/dz/d5/L2dBISEvZ0FBIS9nQSEh/?uri=nm:oid:Z6_00000000000000A0BR2B300GG2
    HTTP/1.1

    Host: {{Hostname}}

    User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0

    Accept-Encoding: gzip, deflate

    Accept: */*

    '
