# gap: owasp-wstg-conf-08-permissive-crossdomain
id: owasp-wstg-conf-08-permissive-crossdomain

info:
  name: Permissive RIA Cross-Domain Policy (Wildcard)
  author: TyrusRC
  severity: low
  description: |
    Detects Flash crossdomain.xml or Silverlight clientaccesspolicy.xml
    policies that grant access from any origin via an unrestricted wildcard
    domain. A wildcard allows legacy RIA runtimes (and any client honouring
    these files) to perform cross-origin reads against the host with the
    user's credentials, broadening the attack surface for any remaining
    Flash/Silverlight clients or tooling that still respects these files.
  reference:
    - https://owasp.org/www-project-web-security-testing-guide/stable/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/08-Test_RIA_Cross_Domain_Policy
  tags: custom,misconfig,crossdomain,flash,silverlight,owasp,wstg

http:
  - method: GET
    path:
      - "{{BaseURL}}/crossdomain.xml"
      - "{{BaseURL}}/clientaccesspolicy.xml"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - 'allow-access-from domain="*"'
          - 'allow-access-from domain="*.'
          - 'domain uri="*"'
        condition: or
