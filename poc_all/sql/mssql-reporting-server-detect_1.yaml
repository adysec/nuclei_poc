id: mssql-reporting-server-detect

info:
  name: MSSQL Reporting Server Detect
  author: glatisant
  severity: info

http:
  - method: GET
    path:
      - "{{BaseURL}}/ReportServer/pages/ReportViewer.aspx"
      - "{{BaseURL}}/Reports/Pages/Folder.aspx"
    matchers:
      - type: word
        words:
          - "Reporting"
