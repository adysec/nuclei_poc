id: contrastapi-domain-recon

info:
  name: ContrastAPI Domain Reconnaissance
  author: UPinar
  severity: info
  description: |
    Performs domain security reconnaissance using ContrastAPI. Retrieves WHOIS data, DNS records, SSL certificate details, security headers, and threat intelligence for the target domain.
  reference:
    - https://api.contrastcyber.com/docs
    - https://github.com/UPinar/contrastapi
  metadata:
    verified: true
    max-request: 1
  tags: misc,recon,domain,whois,dns,ssl,threat-intel

variables:
  hostname: "{{Host}}"

http:
  - method: GET
    path:
      - "https://api.contrastcyber.com/v1/domain/{{hostname}}"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "domain"
          - "dns"
        condition: and

      - type: status
        status:
          - 200

    extractors:
      - type: json
        name: registrar
        json:
          - '.whois.registrar'

      - type: json
        name: nameservers
        json:
          - '.dns.ns[]'

      - type: json
        name: ssl_issuer
        json:
          - '.ssl.issuer'

      - type: json
        name: ssl_expiry
        json:
          - '.ssl.not_after'

      - type: json
        name: ip_address
        json:
          - '.dns.a[]'

      - type: json
        name: mx_records
        json:
          - '.dns.mx[].host'

      - type: json
        name: waf_vendors
        json:
          - '.waf.detected[]'

      - type: json
        name: risk_score
        json:
          - '.risk_score'
