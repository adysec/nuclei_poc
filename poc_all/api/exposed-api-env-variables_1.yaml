id: exposed-env-variables
info:
  name: Exposed Environment Variables
  author: SirBugs
  severity: high

requests:
  - method: GET
    path:
      - "{{BaseURL}}/api/.env"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "MAIL_HOST="
          - "MAIL_FROM_ADDRESS="
        part: body
        condition: and

      - type: word
        part: header
        words:
          - "text/html"
        negative: true
