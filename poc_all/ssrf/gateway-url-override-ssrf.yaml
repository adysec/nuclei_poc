http:
- matchers:
  - status:
    - 200
    type: status
  - condition: or
    type: word
    words:
    - version
    - ok
  matchers-condition: and
  raw:
  - 'GET /healthz HTTP/1.1

    Host: {{Hostname}}

    '
id: gateway-url-override-ssrf
info:
  author: lobster-guard
  classification:
    cve-id: CVE-2026-26322
    cvss-score: 5.0
    cwe-id: CWE-918
  description: 'OpenClaw before 2026.2.14: the Gateway tool accepted a tool-supplied

    gatewayUrl without sufficient restrictions, causing the host to attempt

    outbound WebSocket connections to user-specified targets.

    '
  name: OpenClaw GatewayUrl Override SSRF (CVE-2026-26322)
  reference:
  - https://nvd.nist.gov/vuln/detail/CVE-2026-26322
  severity: medium
  tags: openclaw,cve2026,ssrf,websocket,gateway
