id: apache-solr-ssrf

info:
  name: Apache Solr Admin Panel Exposure
  author: str1am
  severity: medium
  description: |
    Detects exposed Apache Solr admin panel. The replication endpoint may be vulnerable to SSRF - manual verification required.
  reference:
    - http://www.2cto.com/article/201405/304552.html
  tags: solr,exposure,detection

requests:
  - method: GET
    path:
      - "/solr/db/replication?command=fetchindex&masterUrl=http://127.0.0.1&wt=json&httpBasicAuthUser=&httpBasicAuthPassword="

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Solr Admin"

      - type: status
        status:
          - 200